name: spend_time
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=2.18.1 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Bloc
  bloc: ^8.1.0
  flutter_bloc: ^8.1.1

  # Config
  logger: ^1.1.0
  device_info_plus: ^8.0.0
  package_info_plus: ^3.0.2
  ios_utsname_ext: ^2.2.0

  # Etc
  intl: ^0.17.0

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.0
  flutter_secure_storage: ^6.1.0

  # Design
  lottie: ^2.0.0
  flutter_svg: ^1.1.6
  carousel_slider: ^4.1.1

  # Firebase
  firebase_core: ^2.2.0
  firebase_auth: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^1.0.0
  build_runner: ^2.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/

  fonts:
    - family: SUIT
      fonts:
        - asset: assets/fonts/SUIT-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/SUIT-Bold.ttf
          weight: 700
        - asset: assets/fonts/SUIT-Medium.ttf
          weight: 500
        - asset: assets/fonts/SUIT-Regular.ttf
          weight: 400